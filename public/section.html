<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Розділ — Навчальний портал</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Адмін панель — копія стилів з index.html */
    .admin-panel {
      width: 100%;
      max-width: 660px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
      background: #fafafa;
    }
    .admin-panel-title {
      font-size: 0.82rem;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .admin-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .admin-form input, .admin-form select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-family: Arial, sans-serif;
      flex: 1;
      min-width: 120px;
    }
    .admin-form input:focus, .admin-form select:focus { outline: none; border-color: #888; }
    .admin-sections-list { display: flex; flex-direction: column; gap: 6px; }
    .admin-section-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.85rem;
      background: #fff;
    }
    .admin-section-item.hidden-section { opacity: 0.45; }
    .admin-section-actions { display: flex; gap: 6px; }
    .btn-xs { padding: 3px 10px; font-size: 0.78rem; }
    .btn-danger { border-color: #c00; color: #c00; background: #fff; }
    .btn-danger:hover { background: #c00; color: #fff; }

    /* Хлібні крихти */
    .breadcrumb {
      width: 100%;
      max-width: 660px;
      font-size: 0.83rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .breadcrumb a { color: #888; text-decoration: none; }
    .breadcrumb a:hover { color: #222; }
    .breadcrumb span { margin: 0 6px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">Навчальний портал</a>
    <div class="header-right">
      <span id="nav-username"></span>
      <span class="demo-label">Демонстрація освітнього сайту</span>
      <a href="/login.html" class="btn" id="btn-login">Увійти</a>
      <a href="/register.html" class="btn btn-primary" id="btn-register">Реєстрація</a>
      <button class="btn" id="btn-logout" style="display:none">Вийти</button>
    </div>
  </div>
</header>

<main>

  <!-- Хлібні крихти -->
  <div class="breadcrumb">
    <a href="/">Головна</a>
    <span>›</span>
    <span id="breadcrumb-title">Завантаження...</span>
  </div>

  <!-- Заголовок розділу -->
  <p class="page-title" id="section-title">Завантаження...</p>
  <p class="page-sub" id="section-desc"></p>

  <!-- Адмін: керування матеріалами (копія логіки index.html) -->
  <div class="admin-panel" id="admin-panel" style="display:none">
    <div class="admin-panel-title">Керування матеріалами</div>
    <div class="admin-form">
      <input type="text" id="new-title" placeholder="Назва">
      <input type="text" id="new-desc" placeholder="Опис">
      <select id="new-type">
        <option value="video">Відео</option>
        <option value="pdf">PDF</option>
        <option value="article">Стаття</option>
      </select>
      <input type="text" id="new-filename" placeholder="/video.html або URL">
      <button class="btn btn-primary btn-xs" onclick="addMaterial()">Додати</button>
    </div>
    <div class="admin-sections-list" id="admin-mat-list"></div>
  </div>

  <!-- Картки матеріалів — такий самий вигляд як на index.html -->
  <div class="cards" id="cards-grid">
    <span style="color:#aaa;font-size:0.9rem">Завантаження...</span>
  </div>

</main>

<footer>
  <span>Навчальний портал</span>
  <span>·</span>
  <span>Демонстрація освітнього сайту</span>
</footer>

<script src="/auth.js"></script>
<script>
  const params    = new URLSearchParams(location.search);
  const sectionId = params.get('id');
  let currentSection = null;

  // ── Завантажити розділ ──
  async function loadSection() {
    const res = await fetch('/api/sections');
    const all  = await res.json();
    currentSection = all.find(s => String(s.id) === String(sectionId));

    if (!currentSection) {
      document.getElementById('section-title').textContent = 'Розділ не знайдено';
      document.getElementById('cards-grid').innerHTML =
        '<span style="color:#aaa;font-size:0.9rem">Такого розділу не існує або він прихований.</span>';
      return;
    }

    document.title = currentSection.title + ' — Навчальний портал';
    document.getElementById('section-title').textContent    = currentSection.title;
    document.getElementById('section-desc').textContent     = currentSection.description;
    document.getElementById('breadcrumb-title').textContent = currentSection.title;
  }

  const TYPE_PAGES = { video: '/video.html', pdf: '/pdf.html', article: '/article.html' };

  // ── Картки матеріалів (для всіх) ──
  async function loadMaterials() {
    const res       = await fetch(`/api/materials?sectionId=${sectionId}`);
    const materials = await res.json();
    const grid      = document.getElementById('cards-grid');

    if (!materials.length) {
      grid.innerHTML = '<span style="color:#aaa;font-size:0.9rem">Матеріали ще не додані.</span>';
      return;
    }

    grid.innerHTML = materials.map(m => `
      <a href="${TYPE_PAGES[m.type] || '/video.html'}?materialId=${m.id}" class="card">
        <div class="card-title">${m.title}</div>
        <div class="card-desc">${m.description}</div>
      </a>
    `).join('');
  }

  // ── Адмін: список матеріалів ──
  async function loadAdminMaterials() {
    const res       = await fetch(`/api/materials/all?sectionId=${sectionId}`);
    if (!res.ok) return;
    const materials = await res.json();
    const list      = document.getElementById('admin-mat-list');

    list.innerHTML = materials.map(m => `
      <div class="admin-section-item ${m.active ? '' : 'hidden-section'}">
        <span>${m.title} <span style="color:#aaa">${m.filename}</span></span>
        <div class="admin-section-actions">
          <button class="btn btn-xs" onclick="openEditMaterial(${m.id}, '${esc(m.title)}', '${esc(m.description)}')">Редагувати</button>
          <button class="btn btn-xs" onclick="toggleMaterial(${m.id}, ${m.active})">
            ${m.active ? 'Приховати' : 'Показати'}
          </button>
          <button class="btn btn-danger btn-xs" onclick="deleteMaterial(${m.id})">Видалити</button>
        </div>
      </div>
    `).join('') || '<div style="color:#aaa;font-size:0.84rem">Матеріалів немає</div>';
  }

  function esc(str) {
    return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // ── Додати матеріал ──
  async function addMaterial() {
    const title    = document.getElementById('new-title').value.trim();
    const desc     = document.getElementById('new-desc').value.trim();
    const type     = document.getElementById('new-type').value;
    const filename = document.getElementById('new-filename').value.trim();
    if (!title || !desc || !filename) return alert('Заповніть всі поля');

    await fetch('/api/materials', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ section_id: sectionId, title, description: desc, type, filename })
    });

    document.getElementById('new-title').value    = '';
    document.getElementById('new-desc').value     = '';
    document.getElementById('new-filename').value = '';
    loadMaterials();
    loadAdminMaterials();
  }

  // ── Приховати / Показати ──
  async function toggleMaterial(id, active) {
    await fetch(`/api/materials/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: !active })
    });
    loadMaterials();
    loadAdminMaterials();
  }

  // ── Видалити ──
  async function deleteMaterial(id) {
    if (!confirm('Видалити матеріал?')) return;
    await fetch(`/api/materials/${id}`, { method: 'DELETE' });
    loadMaterials();
    loadAdminMaterials();
  }

  // ── Редагувати (inline форма — точно як на index.html) ──
  function openEditMaterial(id, title, desc) {
    const existing = document.getElementById('inline-edit-form');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.id = 'inline-edit-form';
    form.style.cssText = 'border:1px solid #ccc;border-radius:8px;padding:14px 16px;margin-top:10px;background:#fff;';
    form.innerHTML = `
      <div style="font-size:0.78rem;color:#888;margin-bottom:8px;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px">Редагування матеріалу</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <input id="ei-title" type="text" value="${title}" placeholder="Назва"
          style="flex:1;min-width:120px;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:0.85rem;font-family:Arial,sans-serif">
        <textarea id="ei-desc" placeholder="Опис"
          style="flex:1;min-width:180px;border:1px solid #ccc;border-radius:6px;padding:6px 10px;font-size:0.85rem;font-family:Arial,sans-serif;resize:vertical;min-height:48px">${desc}</textarea>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary btn-xs" onclick="saveEditMaterial(${id})">Зберегти</button>
        <button class="btn btn-xs" onclick="document.getElementById('inline-edit-form').remove()">Скасувати</button>
        <span id="ei-status" style="font-size:0.8rem;color:#080"></span>
      </div>
    `;

    document.getElementById('admin-mat-list').after(form);
    document.getElementById('ei-title').focus();
  }

  async function saveEditMaterial(id) {
    const title = document.getElementById('ei-title').value.trim();
    const desc  = document.getElementById('ei-desc').value.trim();
    if (!title || !desc) return alert('Заповніть назву та опис');

    const res = await fetch(`/api/materials/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description: desc })
    });

    if (res.ok) {
      document.getElementById('ei-status').textContent = '✓ Збережено';
      setTimeout(() => {
        const f = document.getElementById('inline-edit-form');
        if (f) f.remove();
      }, 1000);
      loadMaterials();
      loadAdminMaterials();
    }
  }

  // ── Показуємо адмін-панель якщо є права ──
  window.onUserLoaded = function(user) {
    if (user.role === 'admin') {
      document.getElementById('admin-panel').style.display = 'block';
      loadAdminMaterials();
    }
  };

  // ── Старт ──
  if (sectionId) {
    loadSection();
    loadMaterials();
  } else {
    document.getElementById('section-title').textContent = 'Не вказано розділ';
  }
</script>
</body>
</html>
