<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Відео — Навчальний портал</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">📚 Навчальний портал</a>
    <div class="header-right">
      <span id="nav-username"></span>
      <span class="demo-label">Демонстрація освітнього сайту</span>
      <a href="/login.html" class="btn" id="btn-login">Увійти</a>
      <a href="/register.html" class="btn btn-primary" id="btn-register">Реєстрація</a>
      <button class="btn" id="btn-logout" style="display:none">Вийти</button>
    </div>
  </div>
</header>

<main>
  <div class="content-wrap">
    <p class="content-title"> Відео-лекція</p>

    <video controls id="video-player">
      <source src="/api/content/video" type="video/mp4">
      Ваш браузер не підтримує відео.
    </video>

    <!-- Коментарі -->
    <div class="comments">
      <p class="comments-title"> Коментарі</p>
      <div id="comments-container"></div>
    </div>
  </div>
</main>

<footer>
  <span>📚 Навчальний портал</span>
  <span>·</span>
  <span>Демонстрація освітнього сайту</span>
</footer>

<script src="/auth.js"></script>
<script src="/comments.js"></script>
<script>
  initComments('video', 'comments-container');
</script>
</body>
</html>
