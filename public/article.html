<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стаття — Навчальний портал</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">Навчальний портал</a>
    <div class="header-right">
      <span id="nav-username"></span>
      <span class="demo-label">Демонстрація освітнього сайту</span>
      <a href="/login.html" class="btn" id="btn-login">Увійти</a>
      <a href="/register.html" class="btn btn-primary" id="btn-register">Реєстрація</a>
      <button class="btn" id="btn-logout" style="display:none">Вийти</button>
    </div>
  </div>
</header>

<main>
  <div class="content-wrap">
    <p class="content-title" id="material-title">Стаття</p>

    <div class="article-body" id="article-body">
      <p style="color:#aaa">Завантаження...</p>
    </div>

    <div class="comments">
      <p class="comments-title">Коментарі</p>
      <div id="comments-container"></div>
    </div>
  </div>
</main>

<footer>
  <span>Навчальний портал</span>
  <span>·</span>
  <span>Демонстрація освітнього сайту</span>
</footer>

<script src="/auth.js"></script>
<script src="/comments.js"></script>
<script>
  const params     = new URLSearchParams(location.search);
  const materialId = params.get('materialId');

  async function loadMaterial() {
    if (!materialId) {
      fetch('/api/content/article')
        .then(r => r.json())
        .then(data => {
          document.getElementById('article-body').innerHTML = data.html || '<p>Статтю не знайдено</p>';
        });
      return;
    }
    const res = await fetch(`/api/materials/${materialId}`);
    if (!res.ok) return;
    const m = await res.json();
    document.title = m.title + ' — Навчальний портал';
    document.getElementById('material-title').textContent = m.title;
    const r = await fetch(m.filename);
    const html = await r.text();
    document.getElementById('article-body').innerHTML = html;
  }

  loadMaterial();
  initComments('article', 'comments-container');
</script>
</body>
</html>
